# eve-bot configuration

debug: false

store:
  path: ./eve-bot.db
  janitor_interval: 5m
  action_history_ttl: 168h   # 7d

retry:
  max_retries: 3
  base_backoff: 250ms
  max_backoff: 10s

# Cross-cutting enrichers that run after a source's local normalization but
# before rule evaluation.
enrich:
  names:
    # Resolves character / corporation / alliance IDs to names via ESI bulk
    # /v3/universe/names/. Always on. Resolved names are cached in the store
    # for cache_ttl. Rule expressions and webhook templates can use the new
    # `*_name` fields under victim, each attacker, and final_blow.
    cache_ttl: 168h   # 7d
    # base_url: https://esi.evetech.net

# Reusable functions callable from any `when:` clause and any templated action
# arg. The key is a signature; the value is an expr-lang body that can read the
# event's fields, call other functions, and call Go funcs registered via
# bot.WithFunc. Cycles are rejected at startup. See RULES.md › Custom functions.
# functions:
#   'is_expensive(threshold)': 'zkb.total_value > threshold'

# Event producers. Each source runs in its own goroutine and feeds the shared
# rule engine below. The `name` identifies a source instance for checkpoints
# and is what rules match on via the optional `sources:` field.
sources:
  - name: zkill
    type: zkill
    base_url: https://r2z2.zkillboard.com
    sequence_path: /ephemeral/sequence.json
    poll_interval: 100ms
    backoff_404: 6s

# Shared rule engine. Rules see events from every source unless they opt into
# a subset via `sources:`. Facts are read with fact()/fact_exists()/fact_count()
# and written via the `store` action — rules can therefore coordinate across
# sources (e.g. record a high-value wormhole kill under a key, then have a
# later rule on the evescout source fire when a Thera connection opens into
# that system).
rules:
  mode: first-match
  rules:
    # Always-run writer: counts kills per attacker so later rules can
    # detect repeat offenders. `continue: true` keeps evaluation going
    # even after this rule matches.
    - name: record-attacker-kills
      enabled: true
      priority: 1
      continue: true
      sources: [zkill]
      when: "true"
      actions:
        - type: store
          for: attackers
          args:
            scope: "kill_by_char"
            key: '{{ .item.character_id }}'
            op: inc
            field: count
            by: 1
            ttl: 720h   # 30d rolling window

    - name: high-value-kill
      enabled: true
      priority: 10
      sources: [zkill]
      when: 'zkb.total_value > 1e9'
      actions:
        - type: console

    - name: capital-kill
      enabled: true
      priority: 20
      sources: [zkill]
      when: 'has_capital'
      actions:
        - type: console

    - name: repeat-offender
      enabled: true
      priority: 30
      sources: [zkill]
      when: |
        any(attackers, {
          let f = fact("kill_by_char", string(.character_id));
          f != nil && f.count >= 5
        }) && !zkb.npc
      actions:
        - type: console

    - name: jita-hub-kill
      enabled: true
      priority: 50
      sources: [zkill]
      when: |
        solar_system_name in ["Jita", "Amarr", "Dodixie", "Rens", "Hek"]
        && zkb.total_value > 5e8
        && !zkb.npc
      actions:
        - type: console
